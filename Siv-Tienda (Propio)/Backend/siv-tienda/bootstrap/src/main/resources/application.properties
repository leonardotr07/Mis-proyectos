
server.port=8090
spring.application.name=siv-tienda

# ===========================================
# Conexión a PostgreSQL
# ===========================================
spring.datasource.url=jdbc:postgresql://ep-morning-pine-ah6j7c5m.c-3.us-east-1.aws.neon.tech:5432/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_kuKqDwRm5Wv8
spring.datasource.driver-class-name=org.postgresql.Driver

# ===========================================
# Configuración de JPA / Hibernate
# ===========================================
# ddl-auto: update -> Crea/actualiza las tablas automáticamente al iniciar.
spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL en la consola
spring.jpa.show-sql=true

# Formatea las consultas SQL para que sean legibles
spring.jpa.properties.hibernate.format_sql=true

# Dialecto de PostgreSQL (le dice a Hibernate cómo generar SQL para Postgres)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect